<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Us — Donate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --accent:   #7c6af7;
      --accent2:  #4fd1c5;
      --text:     #e8e8f0;
      --muted:    #6b6b88;
      --danger:   #f87171;
      --radius:   16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─── Animated background grid ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vh;
      background: radial-gradient(ellipse at 50% 0%, rgba(124,106,247,.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout ─── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ─── Header ─── */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp .7s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,106,247,.12);
      border: 1px solid rgba(124,106,247,.3);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: 16px;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── Card ─── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      animation: fadeUp .8s .1s ease both;
    }

    /* ─── Amount presets ─── */
    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .preset-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      padding: 10px 0;
      cursor: pointer;
      transition: all .2s;
    }

    .preset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(124,106,247,.06);
    }

    .preset-btn.active {
      border-color: var(--accent);
      background: rgba(124,106,247,.14);
      color: var(--text);
    }

    /* ─── Form fields ─── */
    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      pointer-events: none;
    }

    input[type="number"],
    input[type="email"],
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input.has-prefix { padding-left: 32px; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,.15);
    }

    input::placeholder { color: var(--muted); }

    /* ─── Divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0 20px;
      color: var(--muted);
      font-size: .78rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Error/status messages ─── */
    .msg {
      display: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .9rem;
      margin-bottom: 20px;
    }

    .msg.error {
      display: block;
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.25);
      color: var(--danger);
    }

    .msg.info {
      display: block;
      background: rgba(79,209,197,.08);
      border: 1px solid rgba(79,209,197,.2);
      color: var(--accent2);
    }

    /* ─── Submit button ─── */
    .submit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, #5a4fe0 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 16px;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 60%);
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124,106,247,.4);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner { display: block; }

    /* ─── Trust strip ─── */
    .trust {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .78rem;
    }

    .trust-item svg { opacity: .6; }

    /* ─── Wallet display ─── */
    .wallet-note {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(79,209,197,.05);
      border: 1px solid rgba(79,209,197,.15);
      border-radius: 10px;
      padding: 12px 14px;
      margin-top: 20px;
      font-size: .82rem;
      color: var(--muted);
    }

    .wallet-note code {
      font-size: .75rem;
      color: var(--accent2);
      word-break: break-all;
    }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%  { opacity: .5; transform: scale(.8); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 520px) {
      .card { padding: 28px 20px; }
      .presets { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <header>
      <div class="badge">Support our work</div>
      <h1>Make a <span>Donation</span></h1>
      <p class="sub">Your contribution is received instantly as USDC on Polygon — no middlemen, no delays.</p>
    </header>

    <div class="card">

      <!-- Amount presets -->
      <div class="presets">
        <button class="preset-btn" data-value="5">$5</button>
        <button class="preset-btn" data-value="10">$10</button>
        <button class="preset-btn" data-value="25">$25</button>
        <button class="preset-btn" data-value="50">$50</button>
      </div>

      <div class="divider">or enter amount</div>

      <!-- Amount -->
      <div class="field">
        <label for="amount">Donation Amount (USD)</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input
            id="amount"
            class="has-prefix"
            type="number"
            min="1"
            step="0.01"
            placeholder="0.00"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Your Email <span style="color:var(--muted);font-size:.75rem;text-transform:none;letter-spacing:0">(for payment receipt)</span></label>
        <input
          id="email"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>

      <!-- Status messages -->
      <div id="msgBox" class="msg"></div>

      <!-- Submit -->
      <button id="donateBtn" class="submit-btn" onclick="handleDonate()">
        <span class="btn-text">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 21C12 21 4 13.5 4 8.5a8 8 0 0116 0c0 5-8 12.5-8 12.5z"/>
          </svg>
          Donate Now
        </span>
        <div class="spinner"></div>
      </button>

      <!-- Trust strip -->
      <div class="trust">
        <div class="trust-item">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Secure & Encrypted
        </div>
        <div class="trust-item">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2"/></svg>
          Instant Settlement
        </div>
        <div class="trust-item">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
          Card / Bank Transfer
        </div>
      </div>

      <!-- Wallet note -->
      <div class="wallet-note">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px;color:var(--accent2)"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01"/></svg>
        <div>
          Payments are settled as <strong>USDC on Polygon</strong> to:<br/>
          <code>0x0f64c014e50c53828d3fe9117b83b2794f5906e3</code>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────
    const PAYOUT_ADDRESS = '0x0f64c014e50c53828d3fe9117b83b2794f5906e3';
    const WALLET_API     = 'https://api.card2crypto.org/control/wallet.php';
    const PAYMENT_PAGE   = 'https://pay.card2crypto.org/pay.php';
    // ────────────────────────────────────────────────────────────

    // Preset button logic
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('amount').value = btn.dataset.value;
      });
    });

    // Deactivate preset if user types custom amount
    document.getElementById('amount').addEventListener('input', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    });

    function showMsg(text, type) {
      const box = document.getElementById('msgBox');
      box.textContent = text;
      box.className = 'msg ' + type;
    }

    function clearMsg() {
      const box = document.getElementById('msgBox');
      box.className = 'msg';
      box.textContent = '';
    }

    async function handleDonate() {
      clearMsg();

      const amountInput = document.getElementById('amount');
      const emailInput  = document.getElementById('email');
      const btn         = document.getElementById('donateBtn');

      const amount = parseFloat(amountInput.value);
      const email  = emailInput.value.trim();

      // ── Validation ──
      if (!amount || amount < 1) {
        showMsg('Please enter a donation amount of at least $1.', 'error');
        amountInput.focus();
        return;
      }

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMsg('Please enter a valid email address.', 'error');
        emailInput.focus();
        return;
      }

      // ── Loading state ──
      btn.disabled = true;
      btn.classList.add('loading');
      showMsg('Preparing your payment…', 'info');

      try {
        // Step 1 — Generate encrypted wallet address
        // Use a unique callback param to avoid cached responses
        const uniqueId  = Date.now();
        const callbackUrl = encodeURIComponent(
          `${location.origin}${location.pathname}?donation=${uniqueId}`
        );

        const walletUrl = `${WALLET_API}?address=${PAYOUT_ADDRESS}&callback=${callbackUrl}`;
        const resp = await fetch(walletUrl);

        if (!resp.ok) throw new Error(`Wallet API error: ${resp.status}`);

        const data = await resp.json();
        const encryptedAddress = data.address_in;

        if (!encryptedAddress) throw new Error('No encrypted address returned from API.');

        // Step 2 — Build the payment redirect URL
        const payUrl = `${PAYMENT_PAGE}?` + new URLSearchParams({
          address:  encryptedAddress,
          amount:   amount.toFixed(2),
          email:    email,
          currency: 'USD',
          domain:   'pay.card2crypto.org'
        }).toString();

        showMsg('Redirecting you to the payment page…', 'info');

        // Short delay so the user sees the redirect message
        setTimeout(() => { window.location.href = payUrl; }, 800);

      } catch (err) {
        console.error(err);
        showMsg('Something went wrong. Please try again in a moment.', 'error');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
